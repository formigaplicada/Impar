<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App do Condomínio - Ímpar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #16a34a; --green-bg: #f0fdf4; --green-border: #bbf7d0;
      --amber: #d97706; --amber-bg: #fffbeb; --amber-border: #fde68a;
      --blue: #2563eb; --blue-bg: #eff6ff; --blue-border: #bfdbfe;
      --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
      --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
      --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
      --header-bg: #64748b;
    }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--slate-50);
      color: var(--slate-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--header-bg);
      padding: 0.875rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-img { height: 36px; width: auto; mix-blend-mode: screen; }
    .logo-fallback { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: white; display: none; }
    .version { font-size: 0.7rem; font-weight: 600; background: rgba(255,255,255,0.2); color: white; padding: 3px 8px; border-radius: 4px; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1.25rem; }
    .wrapper { width: 100%; max-width: 26rem; }

    /* Ecrã de seleção de perfil */
    .profile-screen { display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    .profile-title { text-align: center; }
    .profile-title p { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--slate-400); margin-bottom: 0.5rem; }
    .profile-title h1 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--slate-800); }
    .profile-buttons { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; }
    .btn-profile {
      padding: 0.875rem 1rem; font-size: 1rem; font-weight: 600;
      border: 2px solid var(--slate-200); border-radius: 10px;
      cursor: pointer; background: white; color: var(--slate-800);
      font-family: 'DM Sans', sans-serif; width: 100%;
      transition: all 0.15s; text-align: center;
    }
    .btn-profile:hover { border-color: var(--slate-400); background: var(--slate-50); }
    .btn-profile.impar { border-color: var(--header-bg); color: var(--header-bg); }
    .btn-profile.impar:hover { background: #f1f5f9; }
    .btn-profile.condómino { border-color: var(--amber); color: var(--amber); }
    .btn-profile.condómino:hover { background: var(--amber-bg); }

    /* Ecrã de inserção de ID (Ímpar sem QR) */
    .id-screen { display: flex; flex-direction: column; gap: 1.5rem; }
    .id-screen h2 { font-size: 1.1rem; font-weight: 600; color: var(--slate-800); text-align: center; }
    .id-screen p { font-size: 0.85rem; color: var(--slate-500); text-align: center; }
    .id-input-group { display: flex; gap: 0.5rem; }
    .id-input {
      flex: 1; padding: 0.75rem 1rem; font-size: 1rem;
      border: 2px solid var(--slate-300); border-radius: 0.5rem;
      font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s;
    }
    .id-input:focus { border-color: var(--blue); }
    .id-input::placeholder { color: var(--slate-400); }
    .btn-go {
      padding: 0.75rem 1.25rem; font-size: 1rem; font-weight: 600;
      border: none; border-radius: 0.5rem; cursor: pointer;
      background: var(--header-bg); color: white;
      font-family: 'DM Sans', sans-serif; transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-go:hover { background: var(--slate-700); }
    .btn-go:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-back {
      background: none; border: none; color: var(--slate-400);
      font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif;
      text-align: center; text-decoration: underline; padding: 0;
    }
    .btn-back:hover { color: var(--slate-600); }
    .error-inline { font-size: 0.8rem; color: #dc2626; text-align: center; }

    /* Menu principal */
    .condo-header { text-align: center; margin-bottom: 1.75rem; padding: 0 0.5rem; }
    .condo-label { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--slate-400); margin-bottom: 0.4rem; }
    .condo-name-line1 { font-size: 0.9rem; color: var(--slate-500); font-weight: 400; }
    .condo-name-line2 { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: var(--slate-800); line-height: 1.3; margin-top: 0.15rem; }
    .condo-loading { font-size: 0.9rem; color: var(--slate-400); font-style: italic; }
    .cards { display: flex; flex-direction: column; gap: 0.75rem; }
    .card {
      background: white; border: 1px solid var(--slate-200); border-radius: 14px;
      padding: 1.125rem 1.25rem; display: flex; align-items: center; gap: 1rem;
      cursor: pointer; text-decoration: none; color: inherit;
      transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(0.985); }
    .card.green:hover { border-color: var(--green-border); box-shadow: 0 4px 16px rgba(22,163,74,0.08); }
    .card.amber:hover { border-color: var(--amber-border); box-shadow: 0 4px 16px rgba(217,119,6,0.08); }
    .card.blue:hover { border-color: var(--blue-border); box-shadow: 0 4px 16px rgba(37,99,235,0.08); }
    .card-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card.green .card-icon { background: var(--green-bg); }
    .card.amber .card-icon { background: var(--amber-bg); }
    .card.blue .card-icon { background: var(--blue-bg); }
    .card-text { flex: 1; }
    .card-title { font-size: 0.975rem; font-weight: 600; color: var(--slate-800); margin-bottom: 2px; }
    .card-sub { font-size: 0.78rem; color: var(--slate-500); }
    .card-arrow { color: var(--slate-300); }
    .profile-badge {
      text-align: center; margin-bottom: 1rem;
      font-size: 0.72rem; color: var(--slate-400);
    }
    .profile-badge button {
      background: none; border: none; color: var(--slate-400);
      font-size: 0.72rem; cursor: pointer; text-decoration: underline;
      font-family: 'DM Sans', sans-serif; padding: 0;
    }
    .profile-badge button:hover { color: var(--slate-600); }

    /* Ecrã de PIN */
    .pin-screen { display: flex; flex-direction: column; gap: 1.5rem; }
    .pin-screen h2 { font-size: 1.1rem; font-weight: 600; color: var(--slate-800); text-align: center; }
    .pin-screen p { font-size: 0.85rem; color: var(--slate-500); text-align: center; }
    .pin-input {
      padding: 0.75rem 1rem; font-size: 1.5rem; letter-spacing: 0.3em;
      border: 2px solid var(--slate-300); border-radius: 0.5rem;
      font-family: 'DM Sans', sans-serif; outline: none; text-align: center;
      transition: border-color 0.2s; width: 100%;
    }
    .pin-input:focus { border-color: var(--blue); }
    .pin-input::placeholder { color: var(--slate-400); letter-spacing: normal; font-size: 1rem; }
    .pin-error { font-size: 0.8rem; color: #dc2626; text-align: center; min-height: 1.2em; }

    footer { text-align: center; padding: 1rem; font-size: 0.7rem; color: var(--slate-400); border-top: 1px solid var(--slate-100); }
    .error-box { text-align: center; padding: 2rem; color: var(--slate-500); }
    .error-box strong { display: block; color: var(--slate-700); margin-bottom: 0.5rem; font-size: 1rem; }
  </style>
</head>
<body>
  <header>
    <img src="https://www.impar.pt/wp-content/uploads/2025/01/logo-impar-2048x807.png"
         class="logo-img" id="logo" alt="Ímpar"
         onerror="document.getElementById('logo').style.display='none'; document.getElementById('logoFallback').style.display='block'"/>
    <span class="logo-fallback" id="logoFallback">ÍMPAR</span>
    <span class="version">v3.2</span>
  </header>
  <main>
    <div class="wrapper" id="app"></div>
  </main>
  <footer>App do Condomínio © 2026 · Ímpar</footer>

  <script>
    const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbzhnxJ7ZSpwa4dkYWcYJeEhINVAjJK2BvIwWlU5xjgt2d8B0eaFPfJB3khVg7axSdsd/exec';

    const params = new URLSearchParams(window.location.search);
    const condominioIdFromUrl = params.get('condominio');
    const appParam = params.get('app');

    function getPerfil() { return sessionStorage.getItem('perfil'); }
    function setPerfil(p) { sessionStorage.setItem('perfil', p); }
    function getCondominioId() { return sessionStorage.getItem('condominioId'); }
    function setCondominioId(id) { sessionStorage.setItem('condominioId', id); }

    // PIN da Ímpar: intercala dígitos ímpares (1,3,5,7,...) com cada caracter do ID
    // Ex: ID "ABC" → "1A3B5C" | ID "ABCD" → "1A3B5C7D"
    function generateImparPin(condominioId) {
      const id = String(condominioId);
      let pin = '';
      const odds = [1, 3, 5, 7, 9, 11, 13, 15]; // dígitos ímpares sequenciais
      for (let i = 0; i < id.length; i++) {
        pin += odds[i] + id[i];
      }
      return pin;
    }

    // PIN do Condómino: "9" + ID invertido
    // Ex: ID "ABCD" → "9DCBA"
    function generateCondominoPin(condominioId) {
      const reversed = String(condominioId).split('').reverse().join('');
      return '9' + reversed;
    }

    function splitCondominioName(name) {
      const marker = 'Condomínio Sito na';
      const idx = name.indexOf(marker);
      if (idx !== -1) {
        return { line1: name.substring(0, idx + marker.length).trim(), line2: name.substring(idx + marker.length).trim() };
      }
      let splitPos = 20;
      while (splitPos < name.length && name[splitPos] !== ' ') splitPos++;
      return { line1: name.substring(0, splitPos).trim(), line2: name.substring(splitPos).trim() };
    }

    function buildLinks(condominioId) {
      const base = '?condominio=' + encodeURIComponent(condominioId);
      document.getElementById('linkLimpeza').href = 'limpeza.html' + base;
      document.getElementById('linkOcorrencia').href = 'ocorrencia.html' + base;
      document.getElementById('linkManutencao').href = 'https://impar.pt';
    }

    async function loadCondominioName(condominioId) {
      try {
        const res = await fetch(WEBHOOK_URL + '?action=getNome&condominio=' + encodeURIComponent(condominioId));
        const data = await res.json();
        return data.nome || condominioId;
      } catch(e) {
        return condominioId;
      }
    }

    // Ecrã de PIN genérico — recebe a função geradora e a chave de sessão
    function renderPin(condominioId, perfil) {
      const generatePin = perfil === 'impar' ? generateImparPin : generateCondominoPin;
      const sessionKey = perfil === 'impar' ? 'imparPinOk' : 'condomino_PinOk';
      const expectedPin = generatePin(condominioId);

      document.getElementById('app').innerHTML =
        '<div class="pin-screen">' +
          '<h2>🔒 Validação de Acesso</h2>' +
          '<p>Condomínio: <strong>' + condominioId + '</strong></p>' +
          '<input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="' + (expectedPin.length) + '" placeholder="PIN" autocomplete="off"/>' +
          '<p class="pin-error" id="pinError"></p>' +
          '<button class="btn-back" onclick="renderProfileSelect()">← Voltar</button>' +
        '</div>';
      setTimeout(function() {
        const input = document.getElementById('pinInput');
        if (input) {
          input.addEventListener('input', function(e) {
            const val = e.target.value.replace(/\D/g, '');
            e.target.value = val;
            if (val.length === expectedPin.length) {
              if (val === expectedPin) {
                sessionStorage.setItem(sessionKey, condominioId);
                renderMenu(condominioId, perfil);
              } else {
                document.getElementById('pinError').textContent = '❌ PIN inválido. Tenta novamente.';
                setTimeout(function() { e.target.value = ''; document.getElementById('pinError').textContent = ''; }, 1200);
              }
            }
          });
          input.focus();
        }
      }, 0);
    }

    function renderProfileSelect() {
      document.getElementById('app').innerHTML =
        '<div class="profile-screen">' +
          '<div class="profile-title">' +
            '<p>Bem-vindo</p>' +
            '<h1>Quem é você?</h1>' +
          '</div>' +
          '<div class="profile-buttons">' +
            '<button class="btn-profile impar" onclick="chooseProfile(\'impar\')">🏢 &nbsp;Ímpar</button>' +
            '<button class="btn-profile condómino" onclick="chooseProfile(\'condómino\')">🏠 &nbsp;Condómino</button>' +
          '</div>' +
        '</div>';
    }

    function renderImparIdInput() {
      document.getElementById('app').innerHTML =
        '<div class="id-screen">' +
          '<h2>Acesso Ímpar</h2>' +
          '<p>Introduz o ID do condomínio para aceder ao menu.</p>' +
          '<div class="id-input-group">' +
            '<input class="id-input" id="condIdInput" type="text" inputmode="numeric" placeholder="Ex: 1234" autocomplete="off"/>' +
            '<button class="btn-go" id="btnGo" onclick="handleImparIdSubmit()" disabled>Aceder →</button>' +
          '</div>' +
          '<p class="error-inline" id="idError" style="display:none;"></p>' +
          '<button class="btn-back" onclick="renderProfileSelect()">← Voltar</button>' +
        '</div>';
      setTimeout(function() {
        const input = document.getElementById('condIdInput');
        if (input) {
          input.addEventListener('input', function() {
            document.getElementById('btnGo').disabled = input.value.trim().length === 0;
          });
          input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleImparIdSubmit();
          });
          input.focus();
        }
      }, 0);
    }

    async function renderMenu(condominioId, perfil) {
      document.getElementById('app').innerHTML =
        '<div class="profile-badge">A aceder como <strong>' + (perfil === 'impar' ? 'Ímpar' : 'Condómino') + '</strong> &nbsp;·&nbsp; <button onclick="resetPerfil()">trocar perfil</button></div>' +
        '<div class="condo-header" id="condoHeader"><p class="condo-loading">A carregar...</p></div>' +
        '<div class="cards" id="cards" style="display:none;">' +
          (perfil === 'impar' ?
            '<a class="card green" id="linkLimpeza" href="#"><div class="card-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="card-text"><p class="card-title">Limpeza</p><p class="card-sub">Registar check-in de limpeza</p></div><svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></a>' : '') +
          '<a class="card amber" id="linkOcorrencia" href="#"><div class="card-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="card-text"><p class="card-title">Ocorrência</p><p class="card-sub">Reportar problema ou incidente</p></div><svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></a>' +
          (perfil === 'impar' ?
            '<a class="card blue" id="linkManutencao" href="https://impar.pt"><div class="card-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div><div class="card-text"><p class="card-title">Manutenção</p><p class="card-sub">Solicitar intervenção técnica</p></div><svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></a>' : '') +
        '</div>';

      if (perfil === 'impar') buildLinks(condominioId);
      else {
        const base = '?condominio=' + encodeURIComponent(condominioId);
        document.getElementById('linkOcorrencia').href = 'ocorrencia.html' + base;
      }

      const nome = await loadCondominioName(condominioId);
      const { line1, line2 } = splitCondominioName(nome);
      document.getElementById('condoHeader').innerHTML =
        '<p class="condo-label">A sua localização</p>' +
        '<p class="condo-name-line1">' + line1 + '</p>' +
        (line2 ? '<p class="condo-name-line2">' + line2 + '</p>' : '');
      document.getElementById('cards').style.display = 'flex';
    }

    // ── ACTIONS ───────────────────────────────────────────────────

    function chooseProfile(perfil) {
      setPerfil(perfil);
      const condId = getCondominioId();

      if (perfil === 'impar') {
        if (!condId) {
          renderImparIdInput();
        } else if (sessionStorage.getItem('imparPinOk') === condId) {
          renderMenu(condId, 'impar');
        } else {
          renderPin(condId, 'impar');
        }
      } else {
        // Condómino
        if (!condId) {
          document.getElementById('app').innerHTML =
            '<div class="error-box"><strong>Condomínio não identificado</strong>Verifica o QR Code e tenta novamente.</div>';
        } else if (sessionStorage.getItem('condomino_PinOk') === condId) {
          renderMenu(condId, 'condómino');
        } else {
          renderPin(condId, 'condómino');
        }
      }
    }

    function handleImparIdSubmit() {
      const input = document.getElementById('condIdInput');
      const id = input ? input.value.trim() : '';
      if (!id) return;
      setCondominioId(id);
      renderPin(id, 'impar');
    }

    function resetPerfil() {
      sessionStorage.removeItem('perfil');
      sessionStorage.removeItem('condominioId');
      sessionStorage.removeItem('imparPinOk');
      sessionStorage.removeItem('condomino_PinOk');
      renderProfileSelect();
    }

    // ── INIT ──────────────────────────────────────────────────────

    function init() {
      if (condominioIdFromUrl) {
        setCondominioId(condominioIdFromUrl);
        sessionStorage.removeItem('perfil');
        sessionStorage.removeItem('imparPinOk');
        sessionStorage.removeItem('condomino_PinOk');
      }

      const condId = condominioIdFromUrl || getCondominioId();
      if (appParam && condId) {
        if (appParam === 'limpeza') { window.location.href = 'limpeza.html?condominio=' + encodeURIComponent(condId); return; }
        if (appParam === 'ocorrencia') { window.location.href = 'ocorrencia.html?condominio=' + encodeURIComponent(condId); return; }
        if (appParam === 'manutencao') { window.location.href = 'https://impar.pt'; return; }
      }

      const perfil = getPerfil();
      if (!perfil) { renderProfileSelect(); return; }

      const condominioId = getCondominioId();
      if (condominioId) {
        if (perfil === 'impar') {
          if (sessionStorage.getItem('imparPinOk') === condominioId) {
            renderMenu(condominioId, 'impar');
          } else {
            renderPin(condominioId, 'impar');
          }
        } else {
          if (sessionStorage.getItem('condomino_PinOk') === condominioId) {
            renderMenu(condominioId, 'condómino');
          } else {
            renderPin(condominioId, 'condómino');
          }
        }
      } else if (perfil === 'impar') {
        renderImparIdInput();
      } else {
        document.getElementById('app').innerHTML =
          '<div class="error-box"><strong>Condomínio não identificado</strong>Verifica o QR Code e tenta novamente.</div>';
      }
    }

    init();
  </script>
</body>
</html>
