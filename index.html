<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in Limpeza - Ímpar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --blue-600: #2563eb; --blue-700: #1d4ed8; --blue-100: #dbeafe;
      --green-600: #16a34a; --green-700: #15803d; --green-100: #dcfce7;
      --emerald-600: #059669; --emerald-700: #047857; --amber-100: #fef3c7;
      --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
      --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
      --slate-600: #475569; --slate-800: #1e293b; --slate-900: #0f172a;
      --red-600: #dc2626;
    }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, var(--slate-50), var(--slate-100));
      color: var(--slate-900);
      font-size: 16px;
      line-height: 1.5;
    }
    .container { display: flex; flex-direction: column; min-height: 100vh; }
    header {
      background-color: white;
      border-bottom: 1px solid var(--slate-200);
      padding: 1rem 1.5rem;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
    .header-content { max-width: 56rem; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .logo-section { display: flex; align-items: center; gap: 0.5rem; }
    .logo-img { height: 2.5rem; object-fit: contain; }
    .logo-fallback { font-size: 1.125rem; font-weight: 700; color: var(--slate-800); }
    .header-title { font-size: 0.875rem; color: var(--slate-500); }
    .version-badge { background-color: var(--blue-600); color: white; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.7rem; font-weight: 600; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
    .card-wrapper { width: 100%; max-width: 28rem; }
    .card {
      background-color: white;
      border-radius: 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .card-header { text-align: center; display: flex; flex-direction: column; gap: 0.5rem; }
    .card-icon { width: 3rem; height: 3rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 1.5rem; }
    .card-icon.blue { background-color: var(--blue-100); }
    .card-icon.green { background-color: var(--green-100); }
    .card-icon.amber { background-color: var(--amber-100); }
    .card-title { font-size: 1.5rem; font-weight: 700; color: var(--slate-900); }
    .card-subtitle { font-size: 0.875rem; color: var(--slate-600); }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.875rem; font-weight: 500; color: var(--slate-700); }
    input[type="password"], input[type="text"] {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid var(--slate-300);
      border-radius: 0.5rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus, input[type="text"]:focus { outline: none; border-color: var(--blue-600); }
    input[type="password"] { text-align: center; font-size: 1.5rem; letter-spacing: 0.3em; }
    input::placeholder { color: var(--slate-400); }
    .error-message { color: var(--red-600); font-size: 0.875rem; margin-top: 0.5rem; font-weight: 500; }
    .success-message { color: var(--green-600); font-size: 0.875rem; margin-top: 0.5rem; font-weight: 500; }
    .info-box { background-color: var(--slate-50); border-radius: 0.5rem; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; font-size: 0.875rem; }
    .info-row { display: flex; justify-content: space-between; }
    .info-label { color: var(--slate-600); }
    .info-value { font-weight: 600; color: var(--slate-900); }
    .info-mono { font-family: 'Courier New', monospace; font-size: 0.8rem; }
    .button-group { display: flex; flex-direction: column; gap: 0.75rem; }
    button {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      width: 100%;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-success { background-color: var(--green-600); color: white; }
    .btn-success:hover:not(:disabled) { background-color: var(--green-700); }
    .btn-confirm { background-color: var(--emerald-600); color: white; }
    .btn-confirm:hover:not(:disabled) { background-color: var(--emerald-700); }
    .btn-secondary { background-color: var(--slate-300); color: var(--slate-900); }
    .btn-secondary:hover:not(:disabled) { background-color: var(--slate-400); }
    .helper-text { font-size: 0.75rem; color: var(--slate-500); text-align: center; }
    footer { background-color: white; border-top: 1px solid var(--slate-200); padding: 1rem 1.5rem; text-align: center; font-size: 0.75rem; color: var(--slate-500); }
    .hidden { display: none; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @media (max-width: 640px) { main { padding: 1rem; } .card { padding: 1.5rem; } header { padding: 0.75rem 1rem; } .card-title { font-size: 1.25rem; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="logo-section">
          <img src="https://impar.pt/wp-content/uploads/2023/logo-impar.png" alt="Ímpar" class="logo-img" id="logo" onerror="showLogoFallback()"/>
          <span class="logo-fallback hidden" id="logoFallback">ÍMPAR</span>
        </div>
        <div style="display: flex; align-items: center; gap: 1rem;">
          <span class="header-title">Check-in Limpeza</span>
          <span class="version-badge">v1.6</span>
        </div>
      </div>
    </header>
    <main>
      <div class="card-wrapper" id="app">
        <div class="card">
          <div class="card-header">
            <div class="card-icon blue">⏳</div>
            <h1 class="card-title">Carregando...</h1>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <p>Sistema de Check-in de Limpezas © 2024</p>
    </footer>
  </div>

  <script>
    function showLogoFallback() {
      document.getElementById('logo').classList.add('hidden');
      document.getElementById('logoFallback').classList.remove('hidden');
    }

    let state = {
      step: 'init',
      condominioId: '',
      pin: '',
      location: null,
      loading: false,
      errorMsg: '',
      successMsg: ''
    };

    const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwvP2chjeOIAKYmmms0xmbPSyj3W1AuJ6vkMCQwtfmqeAT_6fTHbNlw5tIo8mQi89Ni/exec';

    function init() {
      const params = new URLSearchParams(window.location.search);
      const cond = params.get('condominio');
      if (cond) {
        state.condominioId = cond;
        state.step = 'pin';
      } else {
        state.step = 'error';
        state.errorMsg = 'Condomínio não identificado. Verifica o QR Code.';
      }
      render();
    }

    function render() {
      const app = document.getElementById('app');

      if (state.step === 'pin') {
        app.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div class="card-icon blue">🔒</div>
              <h1 class="card-title">Validação de Acesso</h1>
              <p class="card-subtitle">Condomínio: <strong>${state.condominioId}</strong></p>
            </div>
            <div class="form-group">
              <label for="pin">PIN de 4 dígitos</label>
              <input id="pin" type="password" maxlength="4" placeholder="••••" autocomplete="off"/>
              <p class="helper-text">O acesso será validado automaticamente ao introduzir 4 dígitos</p>
              ${state.errorMsg ? `<div class="error-message">❌ ${state.errorMsg}</div>` : ''}
            </div>
          </div>
        `;
        setTimeout(() => {
          const pinInput = document.getElementById('pin');
          if (pinInput) {
            pinInput.addEventListener('input', (e) => {
              state.pin = e.target.value.replace(/\D/g, '').slice(0, 4);
              e.target.value = state.pin;
              state.errorMsg = '';
              
              if (state.pin.length === 4) {
                handlePinSubmit();
              }
            });
            pinInput.focus();
          }
        }, 0);
      }

      else if (state.step === 'location') {
        app.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div class="card-icon green">📍</div>
              <h1 class="card-title">Localização</h1>
              <p class="card-subtitle">Permite o acesso ao GPS do telemóvel</p>
            </div>
            <button onclick="handleLocationRequest()" class="btn-success" ${state.loading ? 'disabled' : ''}>
              ${state.loading ? '⏳ A obter localização...' : '📍 Obter Localização'}
            </button>
            <p class="helper-text">A precisão será registada para fins de auditoria.</p>
          </div>
        `;
      }

      else if (state.step === 'confirm' && state.location) {
        const mapsLink = `https://www.google.com/maps/?q=${state.location.latitude},${state.location.longitude}`;
        app.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div class="card-icon amber">✓</div>
              <h1 class="card-title">Confirmar Registo</h1>
            </div>
            <div class="info-box">
              <div class="info-row">
                <span class="info-label">Condomínio:</span>
                <span class="info-value">${state.condominioId}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Latitude:</span>
                <span class="info-value info-mono">${state.location.latitude.toFixed(6)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Longitude:</span>
                <span class="info-value info-mono">${state.location.longitude.toFixed(6)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Precisão:</span>
                <span class="info-value">${Math.round(state.location.accuracy)}m</span>
              </div>
              <div class="info-row">
                <span class="info-label">Hora:</span>
                <span class="info-value">${new Date().toLocaleTimeString('pt-PT')}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Google Maps:</span>
                <span class="info-value"><a href="${mapsLink}" target="_blank" style="color: var(--blue-600); text-decoration: none;">Ver no Mapa</a></span>
              </div>
            </div>
            <div class="button-group">
              <button onclick="handleSubmitLimpeza()" class="btn-confirm" ${state.loading ? 'disabled' : ''}>
                ${state.loading ? '⏳ A registar...' : '✓ Registar Limpeza'}
              </button>
              <button onclick="goToLocation()" class="btn-secondary" ${state.loading ? 'disabled' : ''}>
                ← Voltar
              </button>
            </div>
          </div>
        `;
      }

      else if (state.step === 'success') {
        app.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div style="font-size: 2rem;">✅</div>
              <h1 class="card-title">Sucesso!</h1>
              <p class="card-subtitle" style="white-space: pre-line;">${state.successMsg}</p>
              <p class="helper-text" style="margin-top: 0.5rem;">A página será encerrada em poucos segundos...</p>
            </div>
          </div>
        `;
      }

      else if (state.step === 'error') {
        app.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div style="font-size: 2rem;">⚠️</div>
              <h1 class="card-title">Erro</h1>
              <p class="card-subtitle">${state.errorMsg}</p>
            </div>
            <button onclick="reset()" style="background-color: var(--blue-600); color: white;">Tentar Novamente</button>
          </div>
        `;
      }

      else if (state.step === 'init') {
        app.innerHTML = `
          <div class="card" style="align-items: center; justify-content: center; min-height: 200px;">
            <div style="font-size: 2rem;">⏳</div>
          </div>
        `;
      }
    }

    async function handlePinSubmit() {
      if (state.pin.length !== 4) {
        return;
      }

      state.loading = true;
      render();

      try {
        console.log('Validando PIN:', { condominio: state.condominioId, pin: state.pin });
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'validatePin',
            condominio: state.condominioId,
            pin: state.pin
          })
        });
        
        const data = await response.json();
        console.log('Resposta do webhook:', data);
        
        // Se PIN é válido, avança
        if (data.success) {
          state.step = 'location';
        } else {
          // PIN inválido - mostra erro e permite novo PIN
          state.errorMsg = 'PIN inválido. Tenta novamente.';
          state.pin = '';
          state.step = 'pin';
        }
      } catch (err) {
        console.error('Erro na validação:', err);
        state.errorMsg = 'Erro ao validar PIN. Tenta novamente.';
        state.pin = '';
        state.step = 'pin';
      } finally {
        state.loading = false;
        render();
      }
    }

    function handleLocationRequest() {
      state.loading = true;
      render();

      if (!navigator.geolocation) {
        state.errorMsg = 'Geolocalização não suportada neste navegador.';
        state.step = 'error';
        state.loading = false;
        render();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          state.location = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            accuracy: position.coords.accuracy
          };
          state.step = 'confirm';
          state.loading = false;
          render();
        },
        (error) => {
          state.errorMsg = `Erro ao obter localização: ${error.message}`;
          state.step = 'error';
          state.loading = false;
          render();
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    async function handleSubmitLimpeza() {
      state.loading = true;
      render();
      try {
        const data = {
          action: 'registarLimpeza',
          condominio: state.condominioId,
          pin: state.pin,
          latitude: state.location.latitude,
          longitude: state.location.longitude,
          mapsLink: `https://www.google.com/maps/?q=${state.location.latitude},${state.location.longitude}`,
          timestamp: new Date().toISOString(),
          accuracy: state.location.accuracy
        };
        console.log('Registando limpeza:', data);
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        state.successMsg = `Limpeza registada com sucesso!\nCondomínio: ${state.condominioId}`;
        state.step = 'success';
        setTimeout(() => {
          window.location.href = 'about:blank';
        }, 2000);
      } catch (err) {
        console.error('Erro ao registar limpeza:', err);
        state.errorMsg = 'Erro ao registar limpeza. Tenta novamente.';
        state.step = 'error';
      } finally {
        state.loading = false;
        render();
      }
    }

    function goToLocation() {
      state.step = 'location';
      render();
    }

    function reset() {
      state = {
        step: 'pin',
        condominioId: state.condominioId,
        pin: '',
        location: null,
        loading: false,
        errorMsg: '',
        successMsg: ''
      };
      render();
    }

    init();
  </script>
</body>
</html>
